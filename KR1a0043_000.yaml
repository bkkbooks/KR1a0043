body:
  text: 古周易易類提要臣等謹案古周易一卷宋吕祖謙編古易上下經及十翼本十二篇自費直鄭元以至王弼遞有移綴孔頴逹因弼本作正義行於唐代古易遂不復存宋吕大防始考驗舊文作周易古經二卷朝說之作録古周易八卷薛季宣作古文周易十二卷程回作古周易考一卷李燾作周易古經八篇吳仁傑作古周易十二卷大致互相出入祖謙此書與仁傑書最晚出而較仁傑為有據凡分上經下經彖上傳彖下傳象上傳象下傳繫辭上傳繫辭下傳文言傳說卦傳序卦傳雜卦傳為十二篇宋志作一卷書録解題作十二卷蓋以一篇為一卷其實一也朱子嘗為之跋後作本義即用此本其書與吕大防書相同而不言本之大防尤袤與吳仁傑書嘗論之然祖謙非竊據人書者稅與權校正周易古經序謂偶未見大防本殆得其實矣書録解題又載音訓二卷乃祖謙門人王莘叟所筆受又稱朱子嘗刻是書於臨漳㑹稽益以程氏是正文字及朝氏說此本皆無之殆傳寫者遺之歟乾隆四十一年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1965879f184d5781412ddc4bd2b389a6722c625e6757a85cb6d9c6fc36f85a62
