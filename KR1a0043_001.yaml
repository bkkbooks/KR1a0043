body:
  text: 古周易上經元亨利貞見羣龍旡首吉元亨利牝馬之貞止安貞吉利永貞元亨利貞勿用有攸往利建侯亨匪我求童蒙止利貞此後並倣此故不復盡録古周易彖傳第一大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧至哉坤元萬物資生乃順承天坤厚載物德合無疆含弦光大品物咸亨牝馬地類行地無疆柔順利貞君子攸行先迷失道後順得常西南得朋乃與類行東北喪朋乃終有慶安貞之吉應地無疆後倣此自此以後與咸恆以後合為一卷不分上下古周易象傳第二乾下乾上天行健君子以自強不息坤下坤上地勢坤君子以厚德載物自此以後與咸恆合為一卷不分上下古周易繫辭上傳第三乾初九潛龍勿用陽在下也九二見龍在田德施普也九三終日乾乾反復道也九四或躍在淵進無咎也九五飛龍在天大人造也上九亢龍有悔盈不可久也用九天德不可為首也坤初六履霜堅冰隂始凝也馴致其道至堅冰也六二之動直以方也不習無不利地道光也六三含章可貞以時發也或從王事知光大也六四括囊無咎慎不害也六五黃裳元吉文在中也上六龍戰于野其道窮也用六永貞以大終也後倣此古周易繫辭下傳第四咸初六咸其拇志在外也六二雖凶居吉順不害也九三咸其股亦不處也志在隨人所執下也九四貞吉悔亡未感害也憧憧往來未光大也九五咸其脢志末也上六咸其輔頰舌滕口説也恆初六浚恆之凶始求深也九二悔亡能久中也九三不恆其德無所容也九四久非其位安得禽也六五婦人貞吉從一而終也夫子制義從婦凶也上六振恆在上大無功也後倣此古周易文言第五元者善之長也止其為聖人乎坤至柔而動也剛止天玄而地黃古周易説卦上第六天尊地卑止是以自天祐之吉無不利彖者言乎象者也止各指其所之易與天地凖止故君子之道鮮矣顯諸仁止以言乎天地之間則備矣夫乾其靜也専止道義之門聖人有以見天下之𦣱止盜之招也大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後挂天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五止其知神之所為乎易有聖人之道四焉止子曰易有聖人之道四焉者此之謂也天一地二天三地四天五地六天七地八天九地十子曰夫易何為者也止定之以吉凶所以斷也易曰自天祐之吉無不利止是以自天祐之吉無不利也子曰書不盡言止鼓之舞之以盡神乾坤其易之緼邪止存乎德行古周易説卦中第七八卦成列止貞夫一者也夫乾確然示人易矣止禁民為非曰義古者包犧氏之王天下也止是故吉凶生而悔吝著也陽卦多陰止立心勿恆凶子曰乾坤其易之門邪止其衰世之意邪夫易彰往而察來止以明失得之報易之興也止道不虛行易之為書也原始要終止其剛勝邪易之為書也廣大悉備止故吉凶生焉易之興也其當殷之末世周之止此之謂易之道也夫乾天下之至健也止百姓與能八卦以象告止而吉凶可見矣變動以利言止悔且吝將叛者止其辭屈古周易説卦下第八昔者聖人之作易也止窮理盡性以至於命昔者聖人之作易也止故易六位而成章天地定位止是故易逆數也雷以動之止坤以藏之帝出乎震止妙萬物而為言者也動萬物者莫疾乎雷止既成萬物也乾健也止兊説也乾為馬止兊為羊乾為首止兊為口乾天也止故謂之少女乾為天止為木果坤為地止其於地也為黑震為雷止為蕃鮮巽為木止其究為躁卦坎為水止其於木也為堅多心離為火止其於木也為科上稿艮為山止其於木也為堅多節兊為澤止為羊古周易序卦第九有天地然後萬物生焉止坎者陷也陷必有所麗故受之以離離者麗也麗必有所感故受之以咸咸者感也有天地然後有萬物止故受之以未濟終焉古周易雜卦第十乾剛坤柔止小人道憂也費直易此省去彖傳象傳繫辭傳之目但總以一傳字加於彖傳之首王弼王肅易皆存傳字蓋本於此周易上經元亨利貞見羣龍旡首吉傳大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命保合太和乃利貞首出庶物萬國咸寧乾下乾上天行健君子以自強不息乾初九潛龍勿用陽在下也九二見龍在田德施普也九三終日乾乾反復道也九四或躍在淵進旡咎也九五飛龍在天大人造也上九亢龍有悔盈不可久也用九天德不可為首也鄭康成易此省去六爻之畫又省去用九用六覆卦之畫移下上體於卦畫之下又移卦名於兩體之下又移初九至用九爻位之文加之爻辭之上又合彖傳象傳於經於彖傳加彖曰字於象傳加象曰字乾下乾上乾元亨利貞初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉彖曰大哉乾元止萬國咸寧象曰天行健君子以自強不息潛龍勿用陽在下也見龍在田德施普也終日乾乾反復道也或躍在淵進無咎也飛龍在天大人造也亢龍有悔盈不可久也用九天德不可為首也王弼易此移繫辭上下傳附爻辭之下每爻加象曰字又移文言附乾坤卦後加文言曰字而以繫辭上下傳字施之説卦前後兩篇周易上經乾傳第一坤下坤上坤元亨止安貞吉彖曰至哉坤元止應地無疆象曰地勢坤君子以厚德載物初六履霜堅冰至象曰履霜堅冰隂始凝也馴致其道至堅冰也止用六利永貞象曰用六永貞以大終也文言曰坤至柔而動也剛止天玄而地黃易與天地並未有文字已有此書自伏羲畫八卦以貞悔之象重之為六十四時則有卦有象而無辭始卦之重占以定體文王作彖總論其義謂卦不足以盡吉凶之變乃附著變爻及覆卦之畫以演其占時則有彖有爻而未有爻辭周公繼之於爻畫覆卦之下皆繫辭焉而易上下篇之文始備孔子承三聖為十翼以贊易道彖象繫辭文言説卦序卦雜卦是也謂之易傳彖象繫辭夫子所自著也文言以下弟子記夫子之言也按汲冢書有周易上下篇而無彖象繫辭陛德明釋孔壁所得古文傳為十翼而不言經然則十翼之作其初自為篇簡不與易經相屬此冢壁之藏所以各得其一歟漢田何之易其傳出於孔氏上下經十翼離為十二篇而解者自為章句此古經也又有費直易亡章句崇文總目序云以彖象文言雜入卦中者自費氏始按鄭康成易以文言説卦序卦合為一卷則文言雜入卦中康成猶未爾非自費直始也直本傳云徒以彖象繫辭十篇之言解説上下二經蓋解經但用彖象繫辭漢書本誤以之言字為文言耳十篇云者史舉其凡直之學似於每卦之後列彖象繫辭去其篇第之目而冠傳字以總之正如杜元凱春秋解分經之年與傳之年相附而經自經傳自傳也然彖象繫辭之名一沒不復汩亂古經則始於此劉向嘗以中古文校施孟梁丘經或脫去無咎悔亡唯費氏經與古文同由是諸家之學寖微於漢末而費氏獨興康成因之遂省六爻之畫與覆卦之畫移下上體於卦畫之下而以卦名次之移初九至用九之文而加之爻辭之上又以彖象合之於經而加彖曰象曰之文今王弼易乾卦自文言以前則故鄭氏本也以高貴鄉公淳于俊問對觀之于時康成所注雖合彖象於經而所謂彖象不連經文者猶在及王弼注易用康成之本謂孔子贊爻之辭本以釋經宜相附近及各附當爻每爻加象曰以别之謂之小象又取文言附於乾坤二卦加文言曰三字於首若説卦等篇則仍其舊别自為卷總曰繫辭自是世儒知有弼易而不知有所謂古經矣原三家之學初欲學者尋省易了日趨於簡便而末流之弊學者遂廢古經使後世不見此書之純全與聖人述作之本意可勝嘆哉然則天下之事務趨於簡便者其弊每如此可為作俑者之戒也隋經籍志序謂秦焚書易以卜筮獨存唯失説卦三篇後河內女子得之按今説卦乃止一篇故先儒疑易文亦有亡者不得為全書又説卦之文每及於彖象繫辭必以聖人稱之先儒謂此非虙犧文王周公之作然十翼之書復有所謂彖象繫辭其名相亂學者疑焉仁傑按史稱孔子晚而好易讀之韋編三絶而為之傳顔師古曰傳謂彖象繫辭之屬則知伏羲文王周公之作固曰彖象繫辭而十翼所謂彖象繫辭乃其傳也費氏本有傳字故王弼於每卷必以首卦配傳名之音義釋上經乾傳云傳謂夫子十翼又釋繫辭上云王肅本繫辭上傳由此言之十翼所謂彖象繫辭本不與伏羲文王周公之名相亂古經蓋曰彖傳象傳繫辭傳也今易指孔子象辭為大象而以釋爻辭之文為小象者案易固有大小之象焉大象指八卦八物之象所謂八卦以象告立象以盡意如乾為天震為雷之類説卦載帝出乎震至成言乎艮蘇文忠公謂古有是説孔子從而釋之者是已小象指六十四卦八物相配之象所謂象其物宜是故謂之象八卦成列象在其中如雷在天上大壯之類孔子所著象傳是已然則今大象當曰象傳小象乃孔子所以釋爻辭者當曰繫辭傳也夫孔子釋爻辭之文謂之繫辭傳則周公爻辭曰繫辭可矣歐陽公曰繫者有所繫之謂也故曰繫辭焉以斷其吉凶是故謂之爻言其為辭各聯屬其一爻者也是則孔子専指爻辭為繫辭蘇文忠亦謂以上下繫為繫辭則失之矣然孔穎達以為繫辭通指卦爻之辭言之不専指爻辭是不然按説卦言繫辭者六其二曰繫辭焉以斷其吉凶是故謂之爻此不待言而明者其一曰立象以盡意設卦以盡情偽繫辭焉以盡其言此歷舉三聖之作象謂伏羲六十四卦之象卦繫謂文王周公彖辭繫辭也其一曰因而重之爻在其中繫辭焉而命之動在其中龔深甫侍郎云繫辭焉而命之所以明爻也其一曰易有四象所以示也繫辭焉所以告也正義曰四象謂七八九六案七八即爻之不變者九六即爻之變者然則此章所指亦爻辭也其一曰聖人設卦觀象繫辭焉而明吉凶言設卦所以觀象繫辭所以明吉凶云爾卦謂彖辭繫謂爻辭故曰彖者言乎象爻者言乎變又曰齊小大者存乎卦辨吉凶者存乎辭凡此皆互見其義或以彖對爻或以卦對辭曰卦曰彖云者皆指夫卦辭也曰爻曰辭云者皆指夫爻辭也簡言之則曰卦曰彖曰爻曰辭詳言之則卦曰彖辭爻曰繫辭截然有不可紊者不然卦辭既曰彖矣安得復以繫辭名之説卦凡以卦與辭二文相對韓康伯蘇文忠皆曰辭爻辭也楊元素侍讀亦謂聖人設卦觀象繫辭焉而明吉凶又曰繫辭焉所以告也蓋指周公之所為爻辭以説卦本旨及韓蘇龔楊之言參之謂繫辭非專指爻辭可不可耶雖然謂爻辭為繫辭謂小象為繫辭傳則今所謂上下繫者復何名哉或曰二繫當謂之説卦與今説卦通為三篇諸儒既以繫辭傳為小象而上下繫之名無所歸故取説卦前兩篇名之其實本説卦也歐陽公謂今繫辭之文雜論易之諸卦其辭非有所繫不得謂之繫辭葉少藴左丞亦曰太史公引天下同歸而殊塗一致而百慮為易大傳則漢諸儒固未嘗以今兩篇為繫辭斯其為説卦也審矣太史公以兩篇為大傳者蓋十翼皆謂之易傳而漢之易師楊何之屬又著易傳行於世太史公受易於楊何謂説卦之文為大傳者以别楊何之徒所謂傳耳今詩序一名詩大傳亦以别毛公故訓傳故也鄭東卿論説卦出漢宣時而漢宣之前儒者亦多引援豈秦火之後易家祕此而不輕傳也案太史公周行天下多見先秦古書此三篇之文雖未獻於孝宣之時固己先衆人而見之矣世家不云乎孔子晚喜易序彖繫象説卦文言此其證也先儒以為序之繫之説之文之於義未允此謂序易及彖傳象傳繫傳文言説卦也或者又謂聖人之書不當舍經稱傳案易音義云經者常也法也傳以傳述為義經之為經以其可以為萬世之常法傳則述前人之作如是而已非必尊經而卑傳十翼之文述而不作其體傳也其言經也豈害其為聖人之書乎况史稱孔子讀易而為之傳則傳也者夫子所自名非後人名之也夫如是謂十翼彖象繫辭為彖傳象傳繫辭傳復何疑哉以易考之者伏羲之卦也元亨利貞者文王之彖也曰大哉乾元萬物資始乃統天以下此孔子所述彖之傳也內卦外卦者伏羲卦中貞悔之象也曰乾下乾上天行健君子以自強不息者孔子所述象之傳也一者文王於卦外所演變爻之畫也潛龍勿用者周公繫爻之辭也曰初九潛龍勿用陽在下也者孔子所述繫辭之傳也者文王所演覆卦之畫也曰見羣龍無首吉者周公之繫辭也曰用九天德不可為首者孔子所述繫辭之傳也象述伏羲彖述文王繫辭述周公而象在彖後者穎達謂當繇彖詳而象略疑不専為是孔子所述其肯先文王乎又十翼之次先儒所論亦有多家穎達獨取鄭氏之説云上彖下彖上象下象上繫下繫文言説卦序卦雜卦其説謂經分上下則彖象亦當隨經而分不知經為上下篇直以古者竹簡重大故爾若謂彖象當隨經而分序卦何以不分耶胡祕監且以彖大象小象上繫下繫乾文言坤文言説卦序卦雜卦為十篇胡安定易之曰上彖一下彖二大象三小象四文言五上繫六下繫七説卦八序卦九雜卦十文言既不當離而為二至以二繫居文言之後説卦之前亦恐非其序矣仁傑謂十翼彖傳也象傳也繫辭上下傳也文言也説卦上中下也序卦也雜卦也并上下經是為十二篇上經下經之目本之費直孟喜繫辭上傳繫辭下傳之文本之王肅彖象繫辭文言之次本之藝文志而説卦之為三篇則河內女子所得之數也其篇第在古如此而費鄭以來汨之嗚呼維天未喪斯文故厄於秦而獨不廢奈何後世猶疑其非全書其失在傳注之家以傳參雜於經而然也今舉費鄭王易本各一卦列於右方用見經傳參雜源流之所自易筮之法揲蓍求爻重爻為卦所畫者卦耳如下醴畫上體畫是為卦從其變爻所之六四爻變則為卦是筮者止當畫卦而已也何以名為左氏春秋傳既畫卦曰遇之又載卦名曰觀否昜子雲有言觀易者見其卦而名之觀太玄者數其畫而定之以卦即其名也今畫卦而又名焉亦已近贅左氏蓋兩存之正義謂丘明不畫卦今書有畫卦者後學私畫以備忘耳是未知卦在所當畫而名為可略也六十四卦卦為六位而乾坤於六位之外又有用九用六之爻左傳正義云乾六爻皆陽坤六爻皆隂其爻既純别總其用而為之辭此説未為失之顧聖人設此爻於六位之外用以為占要當有所歸宿耳非可但以虛辭解也子雲曰易始八卦文王六十四淮南書曰伏羲六十四變周室增以六爻帝王世紀曰文王演六十四卦著七八九六之爻案文王所演非今六十四卦焦贛所謂每卦變六十四卦而六十四卦變四千九十六卦者也蓋伏羲以一卦重之為八卦極其變而為六十有四文王以一卦演之為六十四卦極其變而為四千九十有六此所以伏羲八卦而為文王六十四也所增之爻其九六則卦外六爻之畫在乾為初九至上九爻之變者也七八則覆卦之畫在乾為用九爻之不變者也或以卦外爻畫為疑案説卦曰觀變於隂陽而立卦發揮於剛柔而生爻正義謂既觀變立卦又就卦發動揮散於剛柔兩畫而生變動之爻則卦外别生變爻明矣下文易六畫而成卦又曰易六位而成章猶此意也張汝明易索云六畫成卦重卦也女畫成章變卦也重卦指虙犧變卦指文王春秋蔡墨諸人舉易雖不筮亦以變爻為言如舉乾之初九用九則云在乾之姤曰潛龍勿用其坤曰見羣龍無首初九舉各爻之變而用九總六爻之變所謂變卦者也伏羲重一卦為八卦者以乾卦例之為內卦重三成六重之以則為泰重之以則為大壯得而為小畜得而為需得而為大有得而為大畜得而為夬復得本卦為乾劉牧論八八之變曰四營成易十八變而成卦八卦而小成引而伸之以成六十四其説謂姤遁否觀剝晉大有七卦由乾而出并乾為八案伏羲重八卦以卦之全體而重文王演六十四卦以爻之積畫而演劉所論蓋占筮之法八純卦自一世至五世而次之以遊魂歸魂者也此七卦其以積畫變者六以全體變者一豈得為重卦本體劉説誤矣文王演一卦為六十四者以乾卦例之其一爻動而變他卦者六初九變而為姤九二變而為同人九三為履九四為小畜九五為大有上九為夬其兩爻動而變他卦者由遁而下為十有五卦三爻動者由否而下為二十卦四爻動者由觀而下為十五卦五爻動者由剝而下為六卦六爻皆動者一是為坤六爻皆不動者一是為乾凡變他卦者六十有三而不變者一案伏羲畫卦以定體為占故乾復為乾而無所事變文王作易名以變為義占以變為法道以變動不居為體無往而非變也若六爻不動而但為本卦不可謂之變此不謂之變則每卦所變止於六十有三其究才四千三十二卦安得如上所云者哉仁傑案卦遇六爻不動當覆而占之覆者從上倒覆而下是亦一變也如剝六爻不動覆而占之其卦為復子曰窮上反下故受之以復又曰上下無常正義謂剝窮上位之極又下來居於初此以覆卦論也朱子發翰林論易變亦知剝之上九窮而反初乃成復卦苐未深考覆卦之變耳覆卦大抵相反而相為往來不窮之地剝之為復曰七日來復天行也利有攸往剛長也復覆為之剝則曰君子尚消息盈虛天行也不利有攸往小人長也七日來復者由剝六爻至復之初九凡七易以爻主一日也舉隅而言陽七日而復則由復六爻至剝之初爻亦七日而剝矣辰以子午分隂陽自子至午自午至子皆七日故兩卦互以天行為言蓋物極則反剛長之極其勢必至於剝而小人道長之極亦未嘗不復天之道也復極則剝剝極則復兩卦相循如環無端以一消一息一盈一虛往來而不窮凡卦之否泰損益雜卦所論或樂或憂或與或求起止伏見新故久速之理無不盡然以至日月寒暑之推移吉凶禍福之倚伏與夫死生出入神竒臭腐之變化始而終終而始者舉不外乎此伊川先生蔽之以一言曰易中止是言反覆往來上下所以發千載之祕以悟後學者多矣康成不知覆卦之畫與正卦異也而輒去之代以用九用六之文而覆卦泯矣易有覆卦對卦二體六爻皆動則占對卦六爻皆不動則占覆卦其用不同對卦亦謂之變卦正義曰六十四卦卦卦相偶非覆即變覆者表裏視之遂成兩卦屯蒙需訟師比之類是也變者反覆惟成一卦則變以對之乾坤離坎大過頤中孚小過是也案六十四卦皆有對有覆今分五十六卦為覆八卦為對未之盡也以二二相偶言之則可爾五十六卦固自有對卦之體而八卦亦未嘗無覆卦之體也王輔嗣曰卦者時也時有否泰用有行藏一時之制可反而用也一時之吉可反而凶也故卦以反對然知覆卦反對而已元不知覆卦之用夫易窮則變變則通爻自初而至上卦之窮也筮焉而皆遇七八占之窮也不有以變而通之將若之何聖人為是設覆卦與六爻通之為七上爻處卦窮之地則以是變而之初爻六爻皆遇七八不動則以是變而之九六觀五十六卦覆之而成兩卦則以偶相比八卦覆之惟成一卦則各居其所焉聖人之意殆非偶然者矣邵康莭以乾坤離坎大過頤中孚小過為不可易蓋五十六卦覆之則變它卦惟此八卦覆之不失本卦之體此其與諸卦異而不可易者也伏羲畫卦八此有乾坤離坎而震艮巽兊不與焉者案八純卦固有對覆存乎其間震艮巽兊覆之亦成兩卦乾坤離坎覆之亦惟成一卦故康節謂八卦之象不易者四重卦之象不易者八然震艮巽兊非不與乎此頤小過震艮之寓也中孚大過巽兊之寓也先儒謂初畫八卦設竒偶兩畫以象隂陽又曰六十四卦皆從乾坤而來凡竒皆乾而凡偶皆坤也用是知離坎以下六卦之體覆正若一與乾坤等而九六之用獨見於二卦者以乾坤竒偶之畫足以包六十二卦而六隂六陽之畫純一不駁亦六卦之所無也此兩卦六爻皆遇七則覆卦而以用九占之皆遇八則覆卦而以用六占之離坎以下六爻皆遇七八亦以覆卦為占六卦非純畫也六位之外無他爻則各占其卦下之辭至若五十六卦屯六爻皆遇七八則覆而占蒙蒙六爻皆遇七八則覆而占屯他卦倣此占焉夫六爻不動而以覆體為占始於乾終於未濟諸卦之所同也如此而後一卦之變可以為六十四而六十四卦之變可以為四千九十六矣劉夢得曰筮為乾者常遇七斯得乾矣筮為坤者常遇八斯得坤矣沈存中曰惟動則有占不動則無眹今人以易筮者雖不動亦引爻辭斷之易中但有九六既不動則是七八安得用九六爻辭豈亦未悟覆卦之變耶覆卦六十四專為七八爻設夫使六爻皆遇七八而終於不動非易窮則變之旨也列禦寇曰易變而為一一變而為七七變而為九九者究也乃復變而為一蘇文忠亦曰六十四卦三百八十四爻皆據其末而反求其本者也故曰易逆數也其有見於此乎且卦遇七八固當以九六為占列禦冦謂七變而為九穆薑筮遇艮之八變而占隨之六二是七可變而九八可變而六如乾上爻本得七覆卦則為初九矣故曰用九坤上爻本得八覆卦則為初六矣故曰用六所謂七八未嘗不動也惟窮則變焉爾先儒言用九只在上九一爻伊川先生以為不然曰六爻皆用九故曰見羣龍都氏因先儒之誤遂以上九用九合之曰此乾之夬也自一陽來復至五陽為夬進而不已六陽為乾故有用九之義而變體為夬案蔡墨以用九為乾之坤蓋取六陽之變言之不變則固為乾今去其一而以五為義非也矧上九用九之辭正爾相反上九處六爻之極為羣龍之首史所謂上而不能下伸而不能詘往而不能自返者故曰亢龍有悔窮之災也若用九則舍首爻之亢極而復居初爻隱潛之地經所謂知進退存亡而不失其正者故曰天德不可為首孰謂二爻可一也哉注疏之説大抵以初為首如比之初六注曰處比之始為比之首其上六比之無首無所終也正義曰不能為比之初首故無終是不以上為首也王輔嗣謂初上無隂陽定位然以為尊者陽之所處故陽居尊位今上爻居一卦之首可不謂尊乎蘇文忠曰初上者本末之地也以陽居之則正以隂居之則顛案比之上六陽不為首而以隂居之不得其正故曰無首文忠解此爻則又曰比之無首猶言無素也窮而後比是無素也蓋無首或以事言或以象言比之無首以事言者也用九之無首以象言者也先儒謂凡以首以角而取象者未嘗不在於上以足以尾言者未嘗不在於初觀既濟未濟初上之辭則概可見矣輔嗣亦曰夫以剛健而居人之首則物之所不與故乾吉在無首穎達亦曰天德剛健不可更懷尊剛為物之首又曰人君位實尊高故云首出志須卑下故云無首吉然知以乾為首而不能推明上爻為首之義何哉惟朱子發謂以畫卦言之則初為始上為終以成卦言之則上為首初為尾其言最為明了勾微云加用九用六之虛位欲明君臣進退之理案用九用六論正卦固不在六位之數論覆卦則與六爻通之為七輔嗣謂爻之所處即謂之位二用而為虛位其然豈其然乎至言君臣進退之理則為近之蓋乾之上九如堯在位七十載之時至用九則如授舜之後其天下已治而聖人退藏於密之象歟坤之上六如周公誕保文武受命七年之時至用六則如居東之後亦大臣功成名遂身退之象歟淵乎二用之旨也聖人以此垂萬世君臣之大法宜他卦莫得而並歟乾正卦有時乘六龍之文合六陽而為卦也覆卦有見羣龍之文合六陽而為爻也又卦與爻皆以乾元為稱其異者覆卦以上為初耳坤卦類此今側注初上之文以見覆卦之象并變卦對卦覆卦各為之圖古經以卦為名而象寓其中以畫為九六及二用以位積之為初上至十翼而後卦以名列象著兩體爻書九六二用位有初上二四三五之文今舉從其初以彖辭歸之卦下以繫辭歸之爻下以上下體歸之象傳以卦名及初上九六二用之文歸之繫辭傳以上下經仍為兩篇傳為十篇然後古十二篇之易復得其全矣疑此孔氏之舊也凡經傳之文去其後儒所加彖曰象曰文言曰及卦名比大有爻位用九用六之類省文則仍舊貫闕之葉左丞論坎卦云卦辭首曰習坎彖曰習坎重險也以為卦固名坎而習坎乃其卦辭傳經者闕其坎字及徐氏亦云上脫一字朝以道詹事云例諸今文則脫在古文則不脫古文即以其卦為其名故也是説固然苐經雖不脫而彖文脫之又同人彖傳同人曰同人于野亨王昭素謂此同人曰三字錯案正義云彖有疊卦名而稱其卦者同人之彖稱同人曰猶言同人卦曰也同人于野亨是同人卦下之文也如此則同人曰三字乃其卦名故彖傳引之非錯也彖傳有同人卦名今卦闕其名者意經傳參雜後儒見卦名同人與卦辭同人于野亨連文遂省同人字不知卦名與卦下之文本自異卷弗可省已履否諸卦亦如之本文當云同人同人于野亨履當云履履虎尾否當云否否之匪人艮當云艮艮其背坎當云坎習坎有孚維心亨五卦凡省六字傳不附經則此五卦在繫辭傳獨無卦名矣於文宜復今但注逐卦下弗敢傳蓋謹闕文也夫易之為書至矣其藴奧微妙非深造自得者未易言也仁傑不佞未嘗一得其門户獨次其舊文而欲復之紹興辛巳之冬書始萌芽博考深求又二十八年而後定古經一失復之之難如是哉是以君子重變古也噫復之難而知之為尤難後世子雲其有無要不可以逆計不知或靳之曰今易尚不能明如古易何覆瓿之譏固前知其如此此則非仁傑之所恤也姑以待好古不惑之君子而折衷焉河南吳仁傑書吕氏周易古經上經第一乾下乾上乾元亨利貞初九潛龍勿用止獲匪其醜無咎下經第二艮下兊上咸亨止有孚失是上彖第三大哉乾元止是以畜牝牛吉也下彖第四咸感也止剛柔應也上象第五天行健君子以自強不息潛龍勿用陽在下也止以正邦也下象第六山上有澤咸止亦不知節也繫辭上第七天尊地卑止存乎德行繫辭下第八八卦成列止其辭屈文言第九元者善之長也止天玄而地黃説卦第十昔者聖人之作易也止為羊序卦第十一有天地止未濟終焉雜卦第十二乾剛坤柔止小人道憂也右周易古經者彖象所以解經始各為一書王弼専治彖象以為注乃分綴卦爻之下學者於是不見完經而彖象辭次第貫穿之意亦缺然不屬豫因案古文而正之凡經二篇彖象繫辭各二篇文言説卦序卦雜卦各一篇總一十有二篇元豐壬戌七月既望汲郡呂大防序朝氏古周易卦爻第一乾下乾上乾元亨利貞初九潛龍勿用止有孚失是彖第二大哉乾元止剛柔應也象第三天行健君子以自強不息潛龍勿用陽在下也止亦不知節也文言第四元者善之長也止天玄而地黃繫辭第五天尊地卑止其辭屈説卦第六序卦第七雜卦第八以上三篇同呂氏周易卦爻一彖二象三文言四繫辭五説卦六序卦七雜卦八繕寫謹第如上案晉太康初發汲縣舊冢得古簡編科斗文字散亂不可訓知獨周易最為明了上下篇與今正同别有隂陽説而無彖象文言繫辭杜預疑于時仲尼造之於魯尚未播之逺國而漢藝文志易經十二篇施孟梁丘三家顔師古曰上下經及十翼故十二篇是則彖象文言繫辭始附卦爻而傳於漢歟先儒謂費直等専以彖象文言參解易爻以彖象文言雜入卦中者自費氏始其初費不列學官惟行民間至漢末陳元方鄭康成之徒皆學費氏古十二篇之易遂亡孔穎達又謂輔嗣之意象本釋經宜相附近分爻之象辭各附當爻則費氏初變亂古制時猶若今乾卦彖象繫卦之末歟古經始變於費氏而卒大亂於王弼惜哉奈何後之儒生尤而效之杜氏分左氏傳於經宋襄范望輩散太玄贊興測於八十一首之下是其明比也揆觀其初乃如古文尚書司馬遷班固序傳揚雄法言序篇云爾今民間法言列序篇於其篇首與學官書不同概可見也唐李鼎祚又取序卦冠之卦首則又效小王之過也今悉還其初庶幾學者不執彖以徇卦不執象以徇爻云昔韓宣子適魯見易象是古人以卦爻統名之曰象也故曰易者象也其意深矣豈若後之人卦必以象名象必以辭顯紛紛多岐哉嗚呼學者曽未之知也劉牧云小象獨乾不繫乎爻辭尊君也石守道亦曰孔子作彖象於六爻之前小象繫逐爻之下惟乾悉屬之於後者讓也嗚呼他人尚何責哉若夫文字之傳始有齊楚之異音卒有科斗籀篆𨽻書之四變因而訛謬者多矣劉向嘗以中古文易經校施孟梁丘經至蜀李撰又嘗著古文易則今之所傳者皆非古文也安得覩夫劉李之書乎其幸而諸儒之傳今有所稽考者具列其異同舛訛於字下亦庶幾乎同復於古也或曰子能古文何不古文寫之曰有改於華而無變於實者豫不為也如古者竹簡重大以經為二篇今又何必以二篇成帙哉謹録而藏諸以俟博古君子建中靖國元年辛巳五月二十四日嵩山朝説之題右周易古經八篇并呂氏朝氏後記各一篇謹案元豐五年正愍呂公微仲始釐析王輔嗣篇第别定為十有二如劉歆六藝略首所列施孟梁丘三家者刻板置成都學宫於文字句讀初無增損建中靖國元年景迂朝生以道又輯諸家異同或斷以己意有增有損篇第則倣費長翁未解輔嗣未注以前舊本獨并十二為八耳吕朝各出所見初不相祖述亦猶李敏仲與王子雍殊隔而傳易書詩禮其指歸則暗合學者必貴自得大抵若此呂氏於卦爻彖象繫辭並分上下自咸以後為下經下彖下象自八卦成列以後為下繫而文言乃次下繫朝氏俱不分上下更以文言先繫辭餘同呂氏今八篇次第實從朝氏總名周易古經則從呂氏若朝氏但名古周易也或疑孔子有因爻辭而申言之若無所損益於其辭之義者甚衆蓋合而觀之也若别而觀之殆無可疑故讀書必别其合者合其别者一合一别則其義過半具前矣朝氏専主北學凡故訓多取許叔重説文解字陸德明音義僧一行李鼎祚陸希聲及本朝王昭素胡翼之黃聱隅輩所論亦時采掇嘉祐以後獨否朋友相興講習自能辨其失得云眉丹􅏢李燾書漢藝文志易經十二篇古經也才一見於此魏晉以後便自失之隋氏藏書最備亡慮八萬九千卷有竒唐開元麗正殿所藏亦八萬五千餘卷皆不著録今國朝文物之盛一時儒宗嗜古者衆古文班班間出如孝經尚書學者昔所未覩因司馬文正呂汲公遂大傳于時於是古易有呂氏書又有朝氏書刋于成都宜春兩郡李仁甫侍郎嘗合二氏之説刋焉今復出此編世遂有三書矣後進坐眠前修無能為役何敢妄出意見而易則古易也亡一字加損縣故有學事兼奉自仁傑之來一切以資公家乃取為工木費并二氏篇第顛末三君子後記刻置諸校宫淳熙十六年七月九日儒林郎知蘄州羅田縣吳仁傑書睢陽王氏古易上經乾初九潛龍勿用九二見龍在田利見大人九三君子終日乾乾夕惕若厲無咎九四或躍在淵無咎九五飛龍在天利見大人上九亢龍有悔用九見羣龍無首吉止履錯然敬之無咎下經咸至未濟卦辭第一乾元亨利貞止濡其尾無攸利彖辭第二彖曰大哉乾元至剛柔應也大象第三象曰天行健君子以自強不息至君子以慎辨物居方小象第四象曰潛龍勿用陽在下也至亦不知節也文言第五繫辭上第六繫辭下第七説卦第八序卦第九雜卦第十石林先生曰班固儒林傳稱孔子晚而好易讀之韋編三絶而為之傳藝文志敘易云文王重易爻作上下篇孔子為之彖象繫辭文言序卦之屬十篇故總稱易十二篇施孟梁丘三家而其餘王氏以上至周氏六家二篇而已二篇者傳上下經之辭而十二篇者上下經之外又有十篇之説也古易書之序如此吾嘗於睢陽王原叔家得古易本自乾坤而下分咸恆為二篇但有六爻之文如乾坤首言初九潛龍勿用九二見龍在田之類至繇辭彖辭大象小象序卦説卦雜卦文言與今上下繫辭皆别為卷正十二篇乃知今本各以彖象之辭繫每卦之下而取孔氏之傳謂之繫辭者王輔嗣之誤也太史公引天下同歸而殊塗一致而百慮為易大傳則漢諸儒固未嘗以今兩篇為繫辭又漢儒多引正其本萬事理與差之毫釐失之千里為易傳而今無之或者其書亦有脫亡歟九江周氏易上經乾傳第一乾乾下乾上象曰天行健君子以自強不息乾元亨利貞彖曰大哉乾元至萬國咸寧初九潛龍勿用至用九見羣龍無首吉象曰潛龍勿用陽在下也至用九天德不可為首也文言曰至是以動而有悔也上經泰傳第二上經噬嗑傳第三下經咸傳第四下經夬傳第五下經豐傳第六繫辭上第七繫辭下第八起八卦成列至失其守者其辭屈説卦第九起天地定位至篇終序卦雜卦闕易有經有傳文王之卦辭周公之爻辭經也仲尼之彖象傳也其卦則文王之所重也伏羲始作八卦即自重之謂文王重之為六十四非也三代皆有易夏曰連山商曰歸藏周曰周易其經卦皆八其别皆六十有四與今周易卦名相同則夏商以前已有重卦無可疑矣仲尼將聖也其言宜為經而謂之傳何也以其訓釋經旨故謂之傳班固曰孔子晚而好易讀之韋編三絶而為之傳即彖象文言等是也又王弼易卷首尚題乾傳泰傳之名陸德明謂是夫子十翼以傳述為義則經之與傳不可不分若合而言之同謂之經可也古文易書經自經傳自傳各分卷帙不相參入後人取彖象散入卦爻之下使相附近欲學者易曉而今之易經傳相配自鄭康成王弼始亦如引書序各冠其篇首自孔安國始取詩序冠於篇什自毛公始分經之年與傳之年相附自杜預始取其闕便於解經而已惜乎先儒分之失其次序列卦象於彖曰之後而在六爻之前上無所承下無所據六十四卦皆有此誤諸卦象曰有七其一為卦象其六為爻象而坤稱象曰者八獨乾卦稱象曰者一首尾錯亂全與他卦不同以彖曰承無首吉之下則元亨為爻辭所隔矣以潛龍勿用承自強不息之下則卦爻二象合為一矣分潛龍勿用於動而有悔之後則小象與前爻不得相屬矣分乾元者始而亨於乃見天則之後則文言與前假不得相屬矣由卦辭多義又深微故差失次序比他卦為甚蓋不知仲尼之意因世次為先後讃以彖象不可易也卦自伏羲之所畫也故贊之以卦象如曰天行健君子以自強不息是也卦首諸辭文王之所繫也故贊之以彖如曰大哉乾元萬物資始是也爻下諸辭周公之所繫也故贊之以爻象如曰潛龍勿用陽氣潛藏是也故卦象當承本卦之下在彖之前今進卦象於前而後彖次之爻象又次之文言又次之至於初九曰潛龍勿用何謂也以下乃夫子問答之辭最次于後諸卦之爻象皆可以分配六位之下唯乾六爻仲尼三申其義不可分也故併以三節明之於是經傳始各得其歸趣矣伏羲畫卦初無語言文字億載之後文王周公得以繫其辭不失伏羲之本旨者有象存焉故易之道本不可以言辭傳以言辭傳易者聖人之不得已也慮後世浸逺學者失其傳而不能有所入也若三聖不措一辭則六十四卦殆為虛設當委棄廢絶不復見矣故知學易觀象為本而博之以文演之以數於是易道幾無餘藴乃非特彖象失其次序又諸儒從前皆誤以九六為隂陽以七八為夏商易並於總論言之詳矣今將易傳凡彖象文言曰等比經皆低一字使學者知其為傳非有高下之意也若為之注解則將經傳連文而疏注解於其下不害其為尊聖人也又説卦卷首昔者兩假差誤在此今已附入繫辭上下篇自天地定位以下乃為説卦首篇欲見聖人専説八卦之物其次乃序六十四卦之時以雜卦終焉繫辭分章小有差者亦隨而正之庶幾於聖人之道有小補云九江周燔序東萊吕氏古易上經下經案前漢藝文志易經十二篇顔師古曰上下篇及十翼故十二篇杜預春秋左氏傳集解後序曰汲郡汲縣有發舊冢者大得古書周易上下篇與今正同别有隂陽説而無彖象文言繫辭疑于時仲尼造之於魯而未播之於逺國也然則戰國時易固分上下經矣繫辭上傳曰二篇之䇿萬有一千五百二十所謂二篇即上下二篇也然則孔子時易固分上下經矣以此考之易經之分上下必始於文王作周易之時近世朝氏編古周易乃合而為一且謂後人妄有上下經之辨何其考之不詳哉彖象傳第一彖象傳第二卦下之辭為彖唐孔氏曰卦辭文王所作漢上朱震曰文王卦下之辭謂之彖孔子序述其彖之意而已故名其篇曰彖使文王卦下之辭不謂之彖孔子何為言知者觀其彖辭則思過半矣夫子自謂如此非遜以出之之義也經文王周公所作也傳孔子所作也司馬談論六經要指引天下殊塗而同歸一致而百慮謂之易大傳班固謂孔子晚而學易讀之韋編三絶而為之傳傳即十翼也前漢六經與傳皆别行至後漢諸儒作注始分經傳為一耳今王弼注本首卷題曰周易上經乾傳餘卷亦闕有泰傳噬嗑傳咸傳夬傳豐傳之名蓋弼所用者鄭氏本鄭氏既合彖傳象傳於經故合題之耳漢上朱氏曰魏髙貴卿公問博士淳于俊曰今彖象不連經文而注連之何也俊對曰鄭康成合彖象於易者欲使學者尋省易了孔子恐其與文王相亂是以不合則鄭未注六經之前彖象不連經文矣自大哉乾元以下彖之傳也自鄭康成合彖象於經故加彖曰象曰以别之諸卦皆然象上傳第三象下傳第四爻下辭謂之象唐孔氏由爻辭多文王後事升卦六五王用亨於岐山明夷六五箕子之明夷皆文王後事也故諸説皆以為爻辭出於周公馬融陸績等並同此説大象卦畫是也天地水火雷風山澤觀卦畫則見其象也大象之辭如天行健君子以自強不息之類小象釋周公之辭如潛龍勿用陽在下也之類皆象之傳也繫辭上傳第五繫辭下傳第六易始有卦畫而已文王繫之以卦辭周公又繫之以爻辭故曰聖人設卦觀象繫辭焉而明吉凶至於孔子所作則繫辭之傳也案陸氏音釋文王肅本作繫辭上傳訖於雜卦皆有傳字此蓋鄭玄未合經傳前標題之舊也文言傳第七漢上朱氏曰王弼以文言附於乾坤二卦案淳于俊謂鄭康成合彖象於經不言合彖象文言於經則朱氏之説是也説卦傳第八序卦傳第九雜卦傳第十東萊先生曰漢興言易者六家獨費氏傳古文易而不立於學官劉向以中古文易經挍施孟梁丘經或脫去無咎悔亡惟費氏經與古文同然則真孔氏遺書也東京馬融鄭玄皆為費氏學其書始盛行今學官所列王弼易雖宗莊老其書固鄭氏書也費氏易在漢諸家中最近古最見排擯千載之後巋然獨存豈非天哉自康成輔嗣合彖象文言於經學者遂不見古本近世嵩山朝氏編古周易將以復於其舊而其刋補離合之際覽者或以為未安祖謙謹因朝氏書參考傳記復定為十二篇篇目卷帙一以古為斷其説具於音訓云淳熙八年五月望日東萊呂祖謙謹書右古文周易經傳十二篇亡友東萊呂祖謙伯恭父之所定而音訓一篇則其門人金華王莘叟之所筆受也熹嘗以為易經本為卜筮而作皆因吉凶以示訓戒故其言雖約而所包甚廣夫子作傳亦略舉其一端以見凡例而已然自諸儒分經合傳之後學者便文取義往往未及玩心全經而遽執傳之一端以為定説於是一卦一爻僅為一事而易之為用反有所局而無以通乎天下之故若是者熹蓋病之是以三復伯恭父之書而有發焉非特謂其章句之近古而已也音訓則妄意其或有所遺脫莘叟蓋言書甫畢而伯恭父沒是則固宜然亦未敢輒補也為之别見于篇後云渟熙九年夏六月庚子朔旦新安朱熹謹書古周易
